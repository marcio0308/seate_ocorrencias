<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4a90c4">
    <meta name="apple-mobile-web-app-title" content="Ausências">
    <title>Controle de Ausências</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e0e0e0;
            padding: 12px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 16px;
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .barra-ferramentas {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        select, input, button, textarea {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        button {
            background: #4a90c4;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        button.secundario {
            background: #666;
        }

        button.perigo {
            background: #c44a4a;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .grid-meses {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-mes {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .mes-titulo {
            background: #f5f5f5;
            padding: 12px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            text-align: center;
            font-size: 16px;
        }

        .dias-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            font-size: 11px;
        }

        .dia-celula {
            min-height: 80px;
            border: 1px solid #eee;
            padding: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .dia-celula:active {
            background: #f0f0f0;
        }

        .numero-dia {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 4px;
            color: #333;
        }

        .ocorrencia {
            font-size: 9px;
            padding: 3px 4px;
            margin: 2px 0;
            border-radius: 4px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }

        .ocorrencia-texto {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-remover-ocorrencia {
            background: rgba(0,0,0,0.3);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 9px;
            padding: 2px 6px;
            min-width: 20px;
        }

        .colab-rosa { background: #e83e8c; }
        .colab-verde { background: #5cb85c; }
        .colab-laranja { background: #f0ad4e; }
        .colab-roxo { background: #aa66cc; }
        .colab-vermelho { background: #d9534f; }
        .colab-azul { background: #4a90c4; }
        .colab-cinza { background: #6c757d; }
        .colab-marrom { background: #8b5a2b; }
        .colab-azul-claro { background: #5bc0de; }

        .painel-lateral {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lista {
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 12px;
            background: #fafafa;
        }

        .lista-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            gap: 8px;
            flex-wrap: wrap;
        }

        .lista-item button {
            padding: 6px 12px;
            font-size: 13px;
        }

        .quadrado-cor {
            width: 24px;
            height: 24px;
            display: inline-block;
            margin-right: 8px;
            border-radius: 4px;
        }

        .contador {
            background: #4a90c4;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-conteudo {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 16px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .botoes-acoes {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .botoes-acoes button {
            flex: 1;
        }

        .status-conexao {
            background: #28a745;
            color: white;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .status-conexao.erro {
            background: #dc3545;
        }

        .status-conexao.sincronizando {
            background: #ffc107;
            color: #333;
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .container {
                padding: 12px;
            }
            .dia-celula {
                min-height: 70px;
                padding: 3px;
            }
            .numero-dia {
                font-size: 11px;
            }
            .ocorrencia {
                font-size: 8px;
                padding: 2px 3px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Controle de Ausências</h1>

    <div id="statusConexao" class="status-conexao">Iniciando...</div>

    <div class="barra-ferramentas">
        <label>Ano:</label>
        <select id="selecionarAno">
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
            <option value="2030">2030</option>
        </select>
    </div>

    <div id="agendaMensal" class="grid-meses">
        <div class="loading">Carregando agenda...</div>
    </div>

    <div class="painel-lateral">
        <div class="lista">
            <h3>Colaboradores</h3>
            <div id="listaColaboradores">
                <div class="loading">Carregando colaboradores...</div>
            </div>
            <button id="novoColaboradorBtn" style="margin-top: 12px; width: 100%;">Novo Colaborador</button>
        </div>
        <div class="lista">
            <h3>Solicitações por Colaborador</h3>
            <div id="resumoContagens">
                <div class="loading">Carregando contagens...</div>
            </div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-conteudo">
        <h3 id="modalTitulo"></h3>
        <div id="modalCorpo"></div>
        <div class="botoes-acoes">
            <button id="modalCancelar" style="background:#999;">Cancelar</button>
            <button id="modalSalvar">Salvar</button>
        </div>
    </div>
</div>

<script>
    // Usando a chave anon key (não a service_role no front-end)
    const SUPABASE_URL = 'https://jpmwryzvgsxbdjdmuoou.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwbXdyeXp2Z3N4YmRqZG11b291Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTM4MDksImV4cCI6MjA5NTg4OTgwOX0.E7yO8lZTqskg21ctXtiQW5oYnt1CKD89J4MKwzHhDaQ';

    let supabaseClient = null;
    let colaboradores = [];
    let ocorrencias = [];
    let anoAtual = 2026;

    function mostrarStatus(mensagem, tipo = 'normal') {
        const statusDiv = document.getElementById('statusConexao');
        statusDiv.textContent = mensagem;
        if (tipo === 'erro') {
            statusDiv.className = 'status-conexao erro';
        } else if (tipo === 'sincronizando') {
            statusDiv.className = 'status-conexao sincronizando';
        } else {
            statusDiv.className = 'status-conexao';
        }
        setTimeout(() => {
            if (statusDiv.className !== 'status-conexao erro') {
                statusDiv.className = 'status-conexao';
                statusDiv.textContent = 'Conectado';
            }
        }, 2000);
    }

    async function initSupabase() {
        try {
            mostrarStatus('Conectando ao banco...', 'sincronizando');
            const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
            supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await carregarDados();
        } catch (error) {
            console.error('Erro:', error);
            mostrarStatus('Erro de conexão', 'erro');
            carregarDadosLocal();
        }
    }

    async function carregarDados() {
        try {
            // Carregar colaboradores
            const { data: colabsData, error: colabsError } = await supabaseClient
                .from('colaboradores')
                .select('*')
                .order('id');
            
            if (colabsError) {
                console.error('Erro colaboradores:', colabsError);
                throw colabsError;
            }
            
            if (colabsData && colabsData.length > 0) {
                colaboradores = colabsData;
            } else {
                // Inserir dados padrão
                colaboradores = [
                    { id: 1, nome: "Anna Flávia", cor: "colab-rosa" },
                    { id: 2, nome: "Daniela", cor: "colab-verde" },
                    { id: 3, nome: "Denise", cor: "colab-laranja" },
                    { id: 4, nome: "Isabelle", cor: "colab-roxo" },
                    { id: 5, nome: "Ivone", cor: "colab-vermelho" },
                    { id: 6, nome: "Paulo", cor: "colab-azul" }
                ];
                
                for (const colab of colaboradores) {
                    await supabaseClient.from('colaboradores').insert([colab]);
                }
            }
            
            // Carregar ocorrências
            const { data: ocorrData, error: ocorrError } = await supabaseClient
                .from('ocorrencias')
                .select('*');
            
            if (ocorrError) {
                console.error('Erro ocorrências:', ocorrError);
                throw ocorrError;
            }
            
            ocorrencias = (ocorrData || []).map(occ => ({
                id: occ.id,
                data: occ.data,
                colaboradorId: occ.colaborador_id,
                motivo: occ.motivo
            }));
            
            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus('Dados carregados!');
            
        } catch (error) {
            console.error('Erro ao carregar:', error);
            mostrarStatus('Erro: ' + error.message, 'erro');
            carregarDadosLocal();
        }
    }

    function carregarDadosLocal() {
        const storedColabs = localStorage.getItem("colaboradores_local");
        const storedOcorr = localStorage.getItem("ocorrencias_local");
        
        if (storedColabs) {
            colaboradores = JSON.parse(storedColabs);
        } else {
            colaboradores = [
                { id: 1, nome: "Anna Flávia", cor: "colab-rosa" },
                { id: 2, nome: "Daniela", cor: "colab-verde" },
                { id: 3, nome: "Denise", cor: "colab-laranja" },
                { id: 4, nome: "Isabelle", cor: "colab-roxo" },
                { id: 5, nome: "Ivone", cor: "colab-vermelho" },
                { id: 6, nome: "Paulo", cor: "colab-azul" }
            ];
        }
        
        if (storedOcorr) {
            ocorrencias = JSON.parse(storedOcorr);
        } else {
            ocorrencias = [];
        }
        
        renderizarTudo();
    }

    function salvarDadosLocal() {
        localStorage.setItem("colaboradores_local", JSON.stringify(colaboradores));
        localStorage.setItem("ocorrencias_local", JSON.stringify(ocorrencias));
    }

    async function adicionarOcorrencia(data, colaboradorId, motivo) {
        const novaOcorrencia = {
            id: Date.now(),
            data: data,
            colaborador_id: colaboradorId,
            motivo: motivo
        };
        
        mostrarStatus('Salvando...', 'sincronizando');
        
        try {
            const { error } = await supabaseClient
                .from('ocorrencias')
                .insert([novaOcorrencia]);
            
            if (error) throw error;
            
            ocorrencias.push({
                id: novaOcorrencia.id,
                data: novaOcorrencia.data,
                colaboradorId: novaOcorrencia.colaborador_id,
                motivo: novaOcorrencia.motivo
            });
            
            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus('Salvo com sucesso!');
            
        } catch (error) {
            console.error('Erro:', error);
            mostrarStatus('Erro: ' + error.message, 'erro');
            // Salvar localmente mesmo com erro
            ocorrencias.push({
                id: novaOcorrencia.id,
                data: novaOcorrencia.data,
                colaboradorId: novaOcorrencia.colaborador_id,
                motivo: novaOcorrencia.motivo
            });
            salvarDadosLocal();
            renderizarTudo();
        }
    }

    async function excluirOcorrencia(id) {
        mostrarStatus('Excluindo...', 'sincronizando');
        
        try {
            const { error } = await supabaseClient
                .from('ocorrencias')
                .delete()
                .eq('id', id);
            
            if (error) throw error;
            
            ocorrencias = ocorrencias.filter(occ => occ.id !== id);
            salvarDadosLocal();
            renderizarTudo();
            mostrarStatus('Excluído!');
            
        } catch (error) {
            console.error('Erro:', error);
            mostrarStatus('Erro ao excluir', 'erro');
            // Excluir localmente mesmo com erro
            ocorrencias = ocorrencias.filter(occ => occ.id !== id);
            salvarDadosLocal();
            renderizarTudo();
        }
    }

    function obterCorColaborador(colabId) {
        const colab = colaboradores.find(c => c.id === colabId);
        return colab ? colab.cor : "colab-cinza";
    }

    function obterNomeColaborador(colabId) {
        const colab = colaboradores.find(c => c.id === colabId);
        return colab ? colab.nome : "Desconhecido";
    }

    function getDiasNoMes(ano, mes) {
        return new Date(ano, mes + 1, 0).getDate();
    }

    function getPrimeiroDiaSemana(ano, mes) {
        return new Date(ano, mes, 1).getDay();
    }

    function obterOcorrenciasDoDia(ano, mes, dia) {
        const dataStr = `${ano}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
        return ocorrencias.filter(occ => occ.data === dataStr);
    }

    function excluirOcorrenciaDireta(id, event) {
        event.stopPropagation();
        if (confirm("Excluir esta ausência?")) {
            excluirOcorrencia(id);
        }
    }

    function abrirModalOcorrencia(occ = null, data = null, colabId = null) {
        const modalDados = occ ? { ...occ } : { data, colaboradorId: colabId, motivo: "", id: null };
        document.getElementById("modalTitulo").innerText = occ ? "Editar Ausência" : "Nova Ausência";
        document.getElementById("modalCorpo").innerHTML = `
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="modalData" value="${modalDados.data || ''}" required>
            </div>
            <div class="form-group">
                <label>Colaborador</label>
                <select id="modalColaborador">
                    ${colaboradores.map(c => `<option value="${c.id}" ${modalDados.colaboradorId === c.id ? 'selected' : ''}>${c.nome}</option>`).join('')}
                </select>
            </div>
            <div class="form-group">
                <label>Motivo</label>
                <textarea id="modalMotivo" rows="3" placeholder="Informe o motivo da ausência">${modalDados.motivo || ''}</textarea>
            </div>
        `;
        
        const modalSalvar = document.getElementById("modalSalvar");
        const modalCancelar = document.getElementById("modalCancelar");
        
        const salvarHandler = () => {
            const data = document.getElementById("modalData").value;
            const colaboradorId = parseInt(document.getElementById("modalColaborador").value);
            const motivo = document.getElementById("modalMotivo").value;
            if (!data || !colaboradorId) {
                alert("Preencha todos os campos.");
                return;
            }
            if (modalDados.id) {
                alert("Edição não disponível. Exclua e crie uma nova.");
            } else {
                adicionarOcorrencia(data, colaboradorId, motivo);
            }
            fecharModal();
            modalSalvar.removeEventListener("click", salvarHandler);
            modalCancelar.removeEventListener("click", cancelarHandler);
        };
        
        const cancelarHandler = () => {
            fecharModal();
            modalSalvar.removeEventListener("click", salvarHandler);
            modalCancelar.removeEventListener("click", cancelarHandler);
        };
        
        modalSalvar.addEventListener("click", salvarHandler);
        modalCancelar.addEventListener("click", cancelarHandler);
        
        document.getElementById("modal").style.display = "flex";
    }

    function abrirModalColaborador(colab = null) {
        alert("Para adicionar colaborador, use o SQL no Supabase.");
    }

    function fecharModal() {
        document.getElementById("modal").style.display = "none";
    }

    function renderizarAgenda() {
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const container = document.getElementById("agendaMensal");
        container.innerHTML = "";

        for (let mes = 0; mes < 12; mes++) {
            const diasNoMes = getDiasNoMes(anoAtual, mes);
            const primeiroDia = getPrimeiroDiaSemana(anoAtual, mes);
            const card = document.createElement("div");
            card.className = "card-mes";

            const titulo = document.createElement("div");
            titulo.className = "mes-titulo";
            titulo.innerText = `${meses[mes]} / ${anoAtual}`;
            card.appendChild(titulo);

            const diasGrid = document.createElement("div");
            diasGrid.className = "dias-grid";

            const diasSemana = ["D", "S", "T", "Q", "Q", "S", "S"];
            diasSemana.forEach(dia => {
                const cab = document.createElement("div");
                cab.style.fontWeight = "600";
                cab.style.textAlign = "center";
                cab.style.padding = "8px 2px";
                cab.style.fontSize = "11px";
                cab.style.background = "#f5f5f5";
                cab.innerText = dia;
                diasGrid.appendChild(cab);
            });

            for (let i = 0; i < primeiroDia; i++) {
                const vazio = document.createElement("div");
                vazio.style.background = "#fafafa";
                diasGrid.appendChild(vazio);
            }

            for (let dia = 1; dia <= diasNoMes; dia++) {
                const celula = document.createElement("div");
                celula.className = "dia-celula";
                const numDiv = document.createElement("div");
                numDiv.className = "numero-dia";
                numDiv.innerText = dia;
                celula.appendChild(numDiv);

                const ocorrDia = obterOcorrenciasDoDia(anoAtual, mes, dia);
                ocorrDia.forEach(occ => {
                    const occDiv = document.createElement("div");
                    occDiv.className = `ocorrencia ${obterCorColaborador(occ.colaboradorId)}`;
                    
                    const textoSpan = document.createElement("span");
                    textoSpan.className = "ocorrencia-texto";
                    textoSpan.innerText = obterNomeColaborador(occ.colaboradorId);
                    textoSpan.title = `Motivo: ${occ.motivo}`;
                    
                    const btnRemover = document.createElement("button");
                    btnRemover.className = "btn-remover-ocorrencia";
                    btnRemover.innerText = "X";
                    btnRemover.title = "Excluir ausência";
                    btnRemover.onclick = (e) => excluirOcorrenciaDireta(occ.id, e);
                    
                    occDiv.appendChild(textoSpan);
                    occDiv.appendChild(btnRemover);
                    
                    occDiv.onclick = (e) => {
                        e.stopPropagation();
                        abrirModalOcorrencia(occ);
                    };
                    
                    celula.appendChild(occDiv);
                });

                celula.onclick = () => abrirModalOcorrencia(null, `${anoAtual}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`, null);
                diasGrid.appendChild(celula);
            }
            card.appendChild(diasGrid);
            container.appendChild(card);
        }
    }

    function renderizarColaboradores() {
        const container = document.getElementById("listaColaboradores");
        container.innerHTML = "";
        colaboradores.forEach(colab => {
            const div = document.createElement("div");
            div.className = "lista-item";
            div.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <div class="quadrado-cor" style="background: ${getCorHex(colab.cor)};"></div>
                    <span>${colab.nome}</span>
                </div>
                <div>
                    <button class="secundario" style="opacity:0.5;" disabled>Editar</button>
                    <button class="perigo" style="opacity:0.5;" disabled>Excluir</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function getCorHex(classe) {
        const cores = {
            'colab-rosa': '#e83e8c',
            'colab-verde': '#5cb85c',
            'colab-laranja': '#f0ad4e',
            'colab-roxo': '#aa66cc',
            'colab-vermelho': '#d9534f',
            'colab-azul': '#4a90c4',
            'colab-cinza': '#6c757d',
            'colab-marrom': '#8b5a2b',
            'colab-azul-claro': '#5bc0de'
        };
        return cores[classe] || '#999';
    }

    function contagemPorColaborador() {
        const contagem = {};
        colaboradores.forEach(c => contagem[c.id] = 0);
        ocorrencias.forEach(occ => {
            if (contagem[occ.colaboradorId] !== undefined) contagem[occ.colaboradorId]++;
        });
        return contagem;
    }

    function renderizarResumo() {
        const container = document.getElementById("resumoContagens");
        const contagem = contagemPorColaborador();
        container.innerHTML = "";
        colaboradores.forEach(colab => {
            const div = document.createElement("div");
            div.className = "lista-item";
            const qtd = contagem[colab.id] || 0;
            div.innerHTML = `
                <span>${colab.nome}</span>
                <span class="contador">${qtd} ${qtd === 1 ? 'solicitação' : 'solicitações'}</span>
            `;
            container.appendChild(div);
        });
    }

    function atualizarAno() {
        anoAtual = parseInt(document.getElementById("selecionarAno").value);
        renderizarAgenda();
    }

    function renderizarTudo() {
        renderizarAgenda();
        renderizarColaboradores();
        renderizarResumo();
    }

    document.getElementById("selecionarAno").addEventListener("change", atualizarAno);
    document.getElementById("novoColaboradorBtn").addEventListener("click", () => {
        alert("Para adicionar colaborador, use o SQL no Supabase:\nINSERT INTO colaboradores (id, nome, cor) VALUES (7, 'Nome', 'colab-cinza');");
    });

    window.addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal")) fecharModal();
    });

    initSupabase();
</script>
</body>
</html>
